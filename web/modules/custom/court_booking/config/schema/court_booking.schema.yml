court_booking.settings:
  type: config_object
  label: 'Court booking settings'
  mapping:
    sport_vocabulary:
      type: string
      label: 'Taxonomy vocabulary machine name for sport labels'
    sport_mappings:
      type: sequence
      label: 'Sport term to product and/or variation IDs'
      sequence:
        type: mapping
        mapping:
          sport_tid:
            type: integer
          product_id:
            type: integer
            label: 'Commerce product ID (0 if using variation_ids only)'
          variation_ids:
            type: sequence
            sequence:
              type: integer
    days_ahead:
      type: integer
    order_type_id:
      type: string
      label: 'Commerce order type ID for the cart'
    booking_day_start:
      type: string
      label: 'First bookable local time (HH:MM)'
    booking_day_end:
      type: string
      label: 'Last allowed slot end local time (HH:MM)'
    max_booking_hours:
      type: integer
      label: 'Maximum hours per single booking (add-to-cart)'
    buffer_minutes:
      type: integer
      label: 'Non-billable buffer in minutes after each booking'
    same_day_cutoff_hm:
      type: string
      label: 'Same-day booking cutoff local time (HH:MM)'
    blackout_dates:
      type: sequence
      label: 'Blackout dates (YYYY-MM-DD)'
      sequence:
        type: string
    resource_closures:
      type: sequence
      label: 'Per-variation temporary closures'
      sequence:
        type: mapping
        mapping:
          variation_id:
            type: integer
          start_date:
            type: string
          end_date:
            type: string
          reason:
            type: string
    sport_booking_overrides:
      type: mapping
      label: 'Per-sport booking rule overrides (keys = sport taxonomy term ID)'
    variation_pricing_windows:
      type: sequence
      label: 'Per-variation local time windows for peak/weekend surcharges'
      sequence:
        type: mapping
        mapping:
          variation_id:
            type: integer
            label: 'Commerce product variation ID'
          windows:
            type: sequence
            label: 'Ordered windows (first wins ties after specificity sort)'
            sequence:
              type: mapping
              mapping:
                label:
                  type: string
                  label: 'Optional admin label'
                days_of_week:
                  type: sequence
                  label: 'PHP weekday numbers 1=Mon … 7=Sun; empty means all days'
                  sequence:
                    type: integer
                start_hm:
                  type: string
                  label: 'Window start HH:MM (inclusive)'
                end_hm:
                  type: string
                  label: 'Window end HH:MM (exclusive)'
                surcharge_source:
                  type: string
                  label: 'peak, weekend, or none'
    variation_pricing_rules:
      type: sequence
      label: 'Per-variation peak/weekend time schedule (time_band + surcharge_field only; legacy keys ignored at runtime until removed by court_booking_update_9023)'
      sequence:
        type: mapping
        mapping:
          variation_id:
            type: integer
          rules:
            type: sequence
            sequence:
              type: mapping
              mapping:
                rule_type:
                  type: string
                enabled:
                  type: boolean
                label:
                  type: string
                days_of_week:
                  type: sequence
                  sequence:
                    type: integer
                start_hm:
                  type: string
                end_hm:
                  type: string
                modifier_kind:
                  type: string
                surcharge_field:
                  type: string
                percent_value:
                  type: string
                percent_direction:
                  type: string
                fixed_number:
                  type: string
                fixed_currency:
                  type: string
                fixed_direction:
                  type: string
                start_date:
                  type: string
                end_date:
                  type: string
                promo_start_date:
                  type: string
                promo_end_date:
                  type: string
                member_role_ids:
                  type: sequence
                  sequence:
                    type: string
                percent_off:
                  type: string

field.formatter.settings.court_booking_cart_rental_slot:
  type: mapping
  label: 'Court booking cart rental slot display'
  mapping:
    show_edit:
      type: boolean
      label: 'Show edit control for lesson lines'
