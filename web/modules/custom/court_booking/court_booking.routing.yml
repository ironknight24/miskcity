court_booking.booking_page:
  path: '/amenities/{sport}'
  defaults:
    _controller: '\Drupal\court_booking\Controller\BookingPageController::content'
    _title: 'Amenities'
  requirements:
    _permission: 'access court booking page'
    sport: '[a-z0-9-]+'

court_booking.court_detail:
  path: '/book/court/{commerce_product_variation}'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtDetailController::content'
    _title_callback: '\Drupal\court_booking\Controller\CourtDetailController::title'
  requirements:
    _custom_access: '\Drupal\court_booking\Controller\CourtDetailController::access'
  options:
    parameters:
      commerce_product_variation:
        type: entity:commerce_product_variation

court_booking.slot_candidates:
  path: '/court-booking/slot-candidates'
  defaults:
    _controller: '\Drupal\court_booking\Controller\SlotCandidatesController::candidates'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\SlotCandidatesAccess::access'
    _csrf_request_header_token: 'TRUE'

court_booking.add:
  path: '/court-booking/add'
  defaults:
    _controller: '\Drupal\court_booking\Controller\BookingAddController::add'
  methods: [POST]
  requirements:
    _permission: 'use court booking add'
    _csrf_request_header_token: 'TRUE'

court_booking.cart_update_slot:
  path: '/court-booking/cart/slot/{commerce_order_item}'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CartSlotUpdateController::updateSlot'
  methods: [POST]
  requirements:
    _permission: 'use court booking add'
    _csrf_request_header_token: 'TRUE'
    _court_booking_cart_slot_order_item: 'TRUE'
  options:
    parameters:
      commerce_order_item:
        type: entity:commerce_order_item

court_booking.settings:
  path: '/admin/commerce/config/court-booking'
  defaults:
    _form: '\Drupal\court_booking\Form\SettingsForm'
    _title: 'Court booking'
  requirements:
    _permission: 'administer court booking'

court_booking.slot_management:
  path: '/admin/commerce/config/court-booking/slot-management'
  defaults:
    _form: '\Drupal\court_booking\Form\SlotManagementForm'
    _title: 'Slot management'
  requirements:
    _custom_access: '\Drupal\court_booking\Access\SlotManagementAccess::access'

court_booking.integrated_bookings:
  path: '/admin/commerce/config/court-booking/bookings'
  defaults:
    _controller: '\Drupal\court_booking\Controller\IntegratedBookingsController::content'
    _title_callback: '\Drupal\court_booking\Controller\IntegratedBookingsController::title'
  requirements:
    _court_booking_integrated_bookings_access: 'TRUE'

court_booking.post_checkout_slot_form:
  path: '/admin/commerce/config/court-booking/bookings/slot/{commerce_order_item}/edit'
  defaults:
    _form: '\Drupal\court_booking\Form\PostCheckoutSlotForm'
    _title: 'Adjust booking slot (override)'
  requirements:
    _court_booking_post_checkout_slot: 'TRUE'
  options:
    parameters:
      commerce_order_item:
        type: entity:commerce_order_item

court_booking.post_checkout_slot:
  path: '/admin/commerce/config/court-booking/bookings/slot/{commerce_order_item}'
  defaults:
    _controller: '\Drupal\court_booking\Controller\PostCheckoutSlotController::updateSlot'
  methods: [POST]
  requirements:
    _court_booking_post_checkout_slot: 'TRUE'
    _csrf_request_header_token: 'TRUE'
  options:
    parameters:
      commerce_order_item:
        type: entity:commerce_order_item

# OAuth2 (Bearer) JSON API for mobile clients — see COURT_BOOKING_API.md
court_booking.rest_v1_availability:
  path: '/rest/v1/court-booking/variations/{commerce_product_variation}/availability'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtBookingRestController::availability'
  methods: [GET]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CourtBookingOAuthAccess::candidatesOrAvailability'
    commerce_product_variation: '\d+'
  options:
    _auth: ['oauth2']
    parameters:
      commerce_product_variation:
        type: entity:commerce_product_variation

court_booking.rest_v1_slot_check:
  path: '/rest/v1/court-booking/variations/{commerce_product_variation}/slot'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtBookingRestController::slotCheck'
  methods: [GET]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CourtBookingOAuthAccess::candidatesOrAvailability'
    commerce_product_variation: '\d+'
  options:
    _auth: ['oauth2']
    parameters:
      commerce_product_variation:
        type: entity:commerce_product_variation

court_booking.rest_v1_slot_candidates:
  path: '/rest/v1/court-booking/slot-candidates'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtBookingRestController::slotCandidates'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CourtBookingOAuthAccess::candidatesOrAvailability'
  options:
    _auth: ['oauth2']

court_booking.rest_v1_add_line:
  path: '/rest/v1/court-booking/cart/line-items'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtBookingRestController::addLineItem'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CourtBookingOAuthAccess::addPermission'
  options:
    _auth: ['oauth2']

court_booking.rest_v1_patch_line:
  path: '/rest/v1/court-booking/cart/line-items/{commerce_order_item}'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CourtBookingRestController::patchLineItem'
  methods: [PATCH]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CourtBookingOAuthAccess::addPermission'
    _court_booking_cart_slot_order_item: 'TRUE'
  options:
    _auth: ['oauth2']
    parameters:
      commerce_order_item:
        type: entity:commerce_order_item

court_booking.rest_v1_commerce_cart:
  path: '/rest/v1/commerce/cart'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CommerceRestController::getCart'
  methods: [GET]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CommerceRestAccess::checkout'
  options:
    _auth: ['oauth2']

court_booking.rest_v1_commerce_complete:
  path: '/rest/v1/commerce/orders/{commerce_order}/checkout/complete'
  defaults:
    _controller: '\Drupal\court_booking\Controller\CommerceRestController::completeCheckout'
  methods: [POST]
  requirements:
    _custom_access: '\Drupal\court_booking\Access\CommerceRestAccess::ownDraftOrder'
    commerce_order: '\d+'
  options:
    _auth: ['oauth2']
    parameters:
      commerce_order:
        type: entity:commerce_order
