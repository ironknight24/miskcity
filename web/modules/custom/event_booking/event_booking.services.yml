services:
  logger.channel.event_booking:
    parent: logger.channel_base
    arguments: ['event_booking']

  event_booking.api:
    class: Drupal\event_booking\EventBookingApiService
    arguments:
      - '@commerce_cart.cart_manager'
      - '@commerce_cart.cart_provider'
      - '@commerce_order.order_refresh'
      - '@entity_type.manager'
      - '@entity_field.manager'
      - '@config.factory'
      - '@global_module.global_variables'
      - '@file_url_generator'
      - '@commerce_stock.service_manager'
      - '@logger.channel.event_booking'
      - '@court_booking.api'
      - '@event_booking.portal_user_client'
    calls:
      - [setStringTranslation, ['@string_translation']]

  event_booking.portal_user_client:
    class: Drupal\event_booking\Portal\PortalUserClient
    arguments:
      - '@global_module.apiman_token_service'
      - '@global_module.vault_config_service'
      - '@http_client'
